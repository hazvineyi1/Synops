kind = "web"
previewPath = "/app/"
title = "Synops Teacher"
version = "1.0.0"
id = "artifacts/paideia-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/app/" ]
localPort = 20379

[services.development]
run = "pnpm --filter @workspace/paideia-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/paideia-app", "run", "build" ]
publicDir = "artifacts/paideia-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20379"
BASE_PATH = "/app/"
