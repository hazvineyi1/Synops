kind = "web"
previewPath = "/"
title = "The Coach"
version = "1.0.0"
id = "artifacts/arete"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20921

[services.development]
run = "pnpm --filter @workspace/arete run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arete", "run", "build" ]
publicDir = "artifacts/arete/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20921"
BASE_PATH = "/"
