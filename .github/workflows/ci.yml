# CI quality gate for the Synops monorepo.
#
# Runs on every push and pull request. It reproduces the two checks that have
# historically caught breakage before it reached Railway:
#   1. `pnpm run typecheck` across the workspace (libs + all app artifacts).
#   2. Building the Coach deployment exactly the way Dockerfile.paideia does,
#      so a change that compiles in isolation but breaks the real build fails
#      here instead of in production.
#
# Node 24 + pnpm 9 mirror Dockerfile.paideia. Keep them in sync with that file.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same branch cancels the older, still-running job.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # Matches Dockerfile.paideia (--no-frozen-lockfile). CI still fails loudly
      # if a dependency is missing or a build script errors.
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # The hard gate: typecheck the whole workspace (libs + artifacts).
      - name: Typecheck
        run: pnpm run typecheck

      # Build the Coach deployment the same way the production image does.
      - name: Build Coach (marketing + study + app + builder + api)
        run: |
          PORT=8080 BASE_PATH=/         pnpm --filter @workspace/paideia-ren   run build
          PORT=8080 BASE_PATH=/study/   pnpm --filter @workspace/paideia-study run build
          PORT=8080 BASE_PATH=/app/     pnpm --filter @workspace/paideia-app   run build
          PORT=8080 BASE_PATH=/builder/ pnpm --filter @workspace/compass-web   run build
          pnpm --filter @workspace/paideia-api run build

  # DB-backed integration suites for the main workspace. compass-api and kanon-api carry the
  # tenant-isolation, billing-authz, impersonation-safety, and evidence-packet tests — the logic
  # that keeps one tenant's data unreachable from another and gates every paid feature. They need a
  # real Postgres (the db package refuses to import without DATABASE_URL), so this job stands up a
  # throwaway server, pushes each schema into its own database, and runs the suites. A regression
  # here is a security or billing hole, so it must fail CI before it reaches Railway.
  test:
    name: integration tests (compass + kanon + engine)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SESSION_SECRET: ci-only-secret-32-chars-minimum-length
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create databases
        run: |
          psql "postgresql://postgres:postgres@localhost:5432/postgres" -c "CREATE DATABASE compass_test;"
          psql "postgresql://postgres:postgres@localhost:5432/postgres" -c "CREATE DATABASE kanon_test;"

      - name: Curriculum engine unit tests (no DB)
        run: pnpm --filter @workspace/compass-curriculum-engine run test

      - name: Compass API integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/compass_test
        run: |
          pnpm --filter @workspace/compass-db run push-force
          pnpm --filter @workspace/compass-api run test

      - name: Kanon API integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kanon_test
        run: |
          pnpm --filter @workspace/kanon-db run push-force
          pnpm --filter @workspace/kanon-api run test

  # Praxis LMS is a SELF-CONTAINED pnpm workspace under praxis/ with its own lockfile, deployed as
  # its own Railway service (Dockerfile.praxis). The Coach job above never builds it, so a Praxis-
  # breaking change could pass CI and only fail in the Railway image build. This job reproduces
  # Dockerfile.praxis exactly so that breakage fails here instead of in production.
  build-praxis:
    name: build praxis (SPA + api)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      # praxis/ is its own workspace root (own pnpm-workspace.yaml + lockfile), so install and build
      # from there — exactly as Dockerfile.praxis does (COPY praxis/ ./ then pnpm install).
      - name: Install (praxis workspace)
        working-directory: praxis
        run: pnpm install --no-frozen-lockfile

      # Typecheck the whole praxis workspace (libs + api-server + SPA). The image
      # builds with esbuild/vite, which skip type checking, so without this a
      # type-level break only surfaces in the Railway image build.
      - name: Typecheck (praxis workspace)
        working-directory: praxis
        run: pnpm run typecheck

      # Unit tests over the permission matrix (roles.ts) and gradebook math (gradebookEngine.ts) —
      # the logic that gates every scoped route and feeds credentials. A regression here re-opens a
      # security hole or corrupts a grade, so it fails CI before it can reach Railway.
      - name: Test Praxis API (permissions + gradebook)
        working-directory: praxis
        run: pnpm --filter @workspace/api-server run test

      - name: Build Praxis (SPA + API)
        working-directory: praxis
        run: |
          PORT=8080 BASE_PATH=/ pnpm --filter @workspace/praxis run build
          pnpm --filter @workspace/api-server run build
